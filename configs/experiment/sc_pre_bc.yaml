# @package _global_

defaults:
  - override /data: starcraft
  - override /model: sc_smart

model:
  model_config:
    lr: 5e-4
    lr_min_ratio: 1e-2
    token_processor:
      agent_token_sampling:
        num_k: 1
        temp: 1.0

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  check_val_every_n_epoch: 1
  max_epochs: 128

data:
  train_batch_size: 4
  val_batch_size: 4
  test_batch_size: 4
  num_workers: 4
